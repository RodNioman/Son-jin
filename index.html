<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Характеристики — Solo Leveling</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0c12;
      color: #c8d0e0;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* ── Основной контейнер ── */
    .container {
      max-width: 820px;
      width: 100%;
      background: #0e121b;
      border: 2px solid #1f2a3a;
      border-radius: 8px;
      padding: 20px 16px 28px;
      box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.15);
      animation: pulse-border 4s infinite ease-in-out;
    }
    @keyframes pulse-border {
      0% { border-color: #1a2a3a; box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.10); }
      50% { border-color: #3a7aaa; box-shadow: inset 0 0 12px 4px rgba(80, 180, 255, 0.20); }
      100% { border-color: #1a2a3a; box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.10); }
    }
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #1f2a3a;
      padding-bottom: 10px;
      margin-bottom: 16px;
    }
    .header .title {
      font-size: 22px;
      font-weight: 700;
      color: #8ab8ff;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(74, 158, 255, 0.2);
    }
    .header .info {
      font-size: 14px;
      color: #6a8aaa;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header .info strong {
      color: #b3d9ff;
    }

    /* ── Карточка характеристик ── */
    .stat-card {
      background: #0e131e;
      border: 1px solid #1a2332;
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 4px 1px rgba(80, 180, 255, 0.08);
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .stat-card:hover {
      border-color: #2a4a6a;
      box-shadow: inset 0 0 6px 2px rgba(80, 180, 255, 0.12);
    }
    .stat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .stat-table th {
      text-align: left;
      color: #6a8aaa;
      font-weight: 400;
      padding: 4px 0;
      border-bottom: 1px solid #1a2332;
    }
    .stat-table td {
      padding: 6px 0;
      border-bottom: 1px solid #141c2a;
      vertical-align: middle;
    }
    .stat-table tr:last-child td {
      border-bottom: none;
    }
    /* ── Названия характеристик: золотые и крупнее ── */
    .stat-table .stat-name {
      color: #d4af37;           /* золотистый */
      font-size: 1.25em;        /* в 1.25 раза больше */
      font-weight: 600;
      min-width: 100px;
    }
    /* ── Значения характеристик: белые, без изменений ── */
    .stat-table .stat-value {
      text-align: right;
      font-weight: 700;
      color: #ffffff;
      min-width: 40px;
    }

    /* ── Карточки квестов ── */
    .card {
      background: #0e131e;
      border: 1px solid #1a2332;
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 4px 1px rgba(80, 180, 255, 0.08);
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .card:hover {
      border-color: #2a4a6a;
      box-shadow: inset 0 0 6px 2px rgba(80, 180, 255, 0.12);
    }
    .card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #7a9ec8;
      margin-bottom: 6px;
    }

    .section-title {
      color: #6a8aaa;
      font-size: 16px;
      font-weight: 400;
      border-bottom: 1px solid #1a2332;
      padding-bottom: 6px;
      margin: 24px 0 12px;
      letter-spacing: 0.5px;
    }

    .quest-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      padding: 3px 0;
      border-bottom: 1px solid #141c2a;
    }
    .quest-item:last-child {
      border-bottom: none;
    }
    .quest-item input[type="checkbox"] {
      accent-color: #4a9eff;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .quest-item.done {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .badge {
      background: #1a2a3e;
      color: #7a9ec8;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 11px;
      display: inline-block;
    }
    .badge.active {
      background: #1a3a5a;
      color: #7ac0ff;
      border: 1px solid #4a9eff;
    }

    .btn {
      background: #1a2a3e;
      border: 1px solid #2a4a6a;
      color: #b3d9ff;
      padding: 8px 0;
      width: 100%;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn:hover {
      background: #1f3a5a;
      border-color: #4a9eff;
    }

    /* ── Ачивки ── */
    .achievement {
      background: #0e131e;
      border-radius: 4px;
      padding: 6px 12px;
      margin: 3px 0;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      border-left: 2px solid #1f3a5a;
      position: relative;
      cursor: default;
      box-shadow: inset 0 0 2px rgba(80,180,255,0.05);
    }
    .achievement.locked {
      opacity: 0.3;
      border-left-color: #2a2a3a;
    }
    .achievement.locked:hover {
      opacity: 0.7;
    }
    .achievement .ach-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: #0e131e;
      border: 1px solid #2a4a6a;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 12px;
      color: #b3d9ff;
      width: 240px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      z-index: 100;
      pointer-events: none;
    }
    .achievement.locked:hover .ach-tooltip {
      display: block;
    }
    .achievement .ach-name {
      font-weight: 400;
    }
    .achievement .ach-bonus {
      color: #7a9ec8;
      font-size: 11px;
    }

    .footer-info {
      font-size: 12px;
      color: #4a5a6a;
      margin-top: 16px;
      border-top: 1px solid #141c2a;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    /* ── Модальное окно приветствия ── */
    .welcome-overlay {
      display: flex;  /* по умолчанию скрыто, но мы покажем через JS */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }
    .welcome-overlay.hidden {
      display: none;
    }
    .welcome-box {
      background: #0e121b;
      border: 2px solid #2a4a6a;
      border-radius: 8px;
      padding: 28px 32px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 40px rgba(80, 180, 255, 0.2), inset 0 0 12px 2px rgba(80, 180, 255, 0.10);
      animation: pulse-border 3s infinite ease-in-out;
    }
    .welcome-box h2 {
      color: #8ab8ff;
      font-weight: 400;
      letter-spacing: 1px;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .welcome-box p {
      color: #b3d9ff;
      font-size: 16px;
      margin: 12px 0;
      line-height: 1.5;
    }
    .welcome-box .highlight {
      color: #d4af37;
      font-weight: 700;
    }
    .welcome-box .btn-accept {
      background: #1a2a3e;
      border: 1px solid #4a9eff;
      color: #b3d9ff;
      padding: 10px 40px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 12px;
    }
    .welcome-box .btn-accept:hover {
      background: #1f3a5a;
      border-color: #7ac0ff;
      box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
    }

    @media (max-width: 600px) {
      .stat-table .stat-name {
        font-size: 1.1em;
        min-width: 70px;
      }
      .header .title {
        font-size: 18px;
      }
      .welcome-box {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<!-- ОВЕРЛЕЙ ПРИВЕТСТВИЯ -->
<div class="welcome-overlay" id="welcomeOverlay">
  <div class="welcome-box">
    <h2>⚔️ ДОБРО ПОЖАЛОВАТЬ</h2>
    <p>
      Охотник, ты пробудился.<br>
      Твой путь начинается сегодня.
    </p>
    <p>
      Дней в системе: <span class="highlight" id="welcomeDays">1</span>
    </p>
    <button class="btn-accept" id="welcomeAccept">ПРИНЯТЬ</button>
  </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div class="container" id="app">

  <div class="header">
    <span class="title">📊 ХАРАКТЕРИСТИКИ</span>
    <div class="info">
      <span>Уровень <strong id="levelDisplay">1</strong></span>
      <span>Опыт <strong id="expDisplay">0</strong></span>
    </div>
  </div>

  <!-- Таблица характеристик в рамке -->
  <div class="stat-card">
    <table class="stat-table">
      <thead>
        <tr>
          <th style="width:60%;">Характеристика</th>
          <th style="width:40%; text-align:right;">Значение</th>
        </tr>
      </thead>
      <tbody id="statBody">
        <!-- генерируется скриптом -->
      </tbody>
    </table>
  </div>

  <div class="section-title">📋 ЕЖЕДНЕВНЫЕ КВЕСТЫ</div>
  <div class="card">
    <h3>💪 Физический</h3>
    <div id="physQuestList"></div>
  </div>
  <div class="card">
    <h3>🧠 Ментальный</h3>
    <div id="mentQuestList"></div>
  </div>
  <div class="card">
    <h3>🗣 Социальный</h3>
    <div id="socQuestList"></div>
  </div>
  <div style="display:flex; gap:12px; flex-wrap:wrap; margin:8px 0;">
    <span class="badge" id="bonusTri">🌟 Триединство: нет</span>
    <span class="badge" id="bonusStreak">🔥 Стрик 7+: нет</span>
  </div>
  <button class="btn" id="btnNewDay">🔄 НОВЫЙ ДЕНЬ</button>

  <div class="section-title">🏆 АЧИВКИ</div>
  <div id="achievementList"></div>

  <div class="footer-info">
    <span>💾 Автосохранение</span>
    <span>⏱️ <span id="lastSave">—</span></span>
  </div>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ЗВУКИ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
  function playTone(freq, dur, type='sine', vol=0.12) {
    try {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = vol;
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }
  function soundClick() { playTone(440, 0.05, 'sine', 0.06); }
  function soundLevelUp() { playTone(523,0.1); setTimeout(()=>playTone(659,0.1),100); setTimeout(()=>playTone(784,0.15),200); }
  function soundAchievement() { playTone(880,0.1); setTimeout(()=>playTone(1109,0.1),120); setTimeout(()=>playTone(1319,0.2),240); }
  function soundNewDay() { playTone(330,0.08); setTimeout(()=>playTone(440,0.08),100); setTimeout(()=>playTone(554,0.12),200); }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ДАННЫЕ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const DEFAULT = {
    day: 1,
    streak: 0,
    freePoints: 0,
    stats: {
      STR: { level: 10, exp: 0 },
      AGI: { level: 10, exp: 0 },
      VIT: { level: 10, exp: 0 },
      INT: { level: 10, exp: 0 },
      CHA: { level: 10, exp: 0 },
      PER: { level: 10, exp: 0 }
    },
    quests: {
      phys: [false,false,false,false,false],
      ment: [false,false,false,false,false],
      soc: [false,false,false,false,false]
    },
    unlockedAchievements: [],
    justUnlocked: []
  };

  function loadData() {
    try {
      const raw = localStorage.getItem('hunterSystemData');
      if (raw) {
        const parsed = JSON.parse(raw);
        for (let key in DEFAULT) {
          if (!(key in parsed)) parsed[key] = DEFAULT[key];
        }
        return parsed;
      }
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT));
  }

  function saveData(data) {
    localStorage.setItem('hunterSystemData', JSON.stringify(data));
    document.getElementById('lastSave').textContent = new Date().toLocaleTimeString();
  }

  function expToNext(level) {
    return Math.round(100 * (1 + (level - 1) * 0.08));
  }

  function avgAllMain(data) {
    const s = data.stats;
    return (s.STR.level + s.AGI.level + s.VIT.level + s.INT.level + s.CHA.level) / 5;
  }

  function getRank(avg) {
    if (avg < 16) return 'E';
    if (avg < 26) return 'D';
    if (avg < 41) return 'C';
    if (avg < 61) return 'B';
    return 'A';
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ОТРИСОВКА
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function renderAll(data) {
    const s = data.stats;
    const avg = avgAllMain(data);
    const rank = getRank(avg);

    // Уровень теперь вычисляется динамически
    document.getElementById('levelDisplay').textContent = Math.round(avg);
    document.getElementById('expDisplay').textContent = Math.round(s.STR.exp + s.AGI.exp + s.VIT.exp + s.INT.exp + s.CHA.exp);

    renderStatTable(data);
    renderQuest('phys', data.quests.phys, getQuestList('phys', rank));
    renderQuest('ment', data.quests.ment, getQuestList('ment', rank));
    renderQuest('soc', data.quests.soc, getQuestList('soc', rank));

    const allDone = data.quests.phys.every(v=>v) && data.quests.ment.every(v=>v) && data.quests.soc.every(v=>v);
    const triEl = document.getElementById('bonusTri');
    triEl.textContent = allDone ? '🌟 Триединство: АКТИВНО' : '🌟 Триединство: нет';
    triEl.className = 'badge' + (allDone ? ' active' : '');
    const streakEl = document.getElementById('bonusStreak');
    const hasStreak = data.streak >= 7;
    streakEl.textContent = hasStreak ? '🔥 Стрик 7+: АКТИВНО' : '🔥 Стрик 7+: нет';
    streakEl.className = 'badge' + (hasStreak ? ' active' : '');

    renderAchievements(data);
    saveData(data);
  }

  function renderStatTable(data) {
    const stats = data.stats;
    const rows = [
      { key: 'STR', label: '💪 Физическая сила' },
      { key: 'VIT', label: '❤️ Жизненная сила' },
      { key: 'AGI', label: '🏃 Ловкость' },
      { key: 'INT', label: '🧠 Интеллект' },
      { key: 'PER', label: '👁 Восприятие' },
      { key: 'CHA', label: '🗣 Харизма' }
    ];
    const tbody = document.getElementById('statBody');
    tbody.innerHTML = '';
    rows.forEach(row => {
      const st = stats[row.key];
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="stat-name">${row.label}</td>
        <td class="stat-value">${st.level}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function renderQuest(type, checks, items) {
    const containerId = type === 'phys' ? 'physQuestList' : (type === 'ment' ? 'mentQuestList' : 'socQuestList');
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    items.forEach((text, idx) => {
      const checked = checks[idx] || false;
      const div = document.createElement('div');
      div.className = 'quest-item' + (checked ? ' done' : '');
      div.innerHTML = `
        <input type="checkbox" ${checked ? 'checked' : ''} data-type="${type}" data-idx="${idx}">
        <span>${text}</span>
      `;
      container.appendChild(div);
    });
    container.querySelectorAll('input[type="checkbox"]').forEach(inp => {
      inp.addEventListener('change', function() {
        soundClick();
        const type = this.dataset.type;
        const idx = parseInt(this.dataset.idx);
        const data = loadData();
        data.quests[type][idx] = this.checked;
        if (!data.dayStarted) data.dayStarted = true;
        saveData(data);
        renderAll(data);
      });
    });
  }

  function getQuestList(type, rank) {
    const ranks = ['E','D','C','B','A'];
    const r = Math.min(ranks.indexOf(rank), 4);
    const idx = r >= 0 ? r : 0;
    const phys = [
      ['Отжимания с колен — 3×12', 'Отжимания — 3×15', 'Отжимания с рюкз. 5кг — 3×20', 'Отжимания с рюкз. 10кг — 3×25', 'Отжимания с рюкз. 15кг — 3×30'],
      ['Приседания без веса — 3×20', 'Приседания с рюкз. 5кг — 3×25', 'Приседания с рюкз. 10кг — 3×30', 'Приседания с рюкз. 15кг — 3×35', 'Приседания с рюкз. 20кг — 3×40'],
      ['Планка на руках — 3×25с', 'Планка на локтях — 3×35с', 'Планка с 5кг — 3×45с', 'Планка с 10кг — 3×60с', 'Планка с 15кг — 3×75с'],
      ['Выпады — 3×10', 'Выпады с 5кг — 3×12', 'Бёрпи — 3×10', 'Бёрпи с отжим. — 3×15', 'Бёрпи с прыжком — 3×20'],
      ['Ходьба 30 мин', 'Ходьба 40 мин', 'Бег 3 км', 'Бег 5 км', 'Бег 7 км (интервалы)']
    ];
    const ment = [
      ['Чтение 20 мин', 'Чтение 30 мин + анализ', 'Чтение 40 мин + разбор', 'Чтение 60 мин + выводы', 'Чтение 90 мин + критика'],
      ['Логика 15 мин', 'Шахматы/задачи 20 мин', 'Дебаты (письм.) 15 мин', 'Статья 500 зн.', 'Эссе 1000 зн.'],
      ['5 слов', '10 слов + диалог', '15 слов', '20 слов', '30 слов'],
      ['Конспект 5-7 пр.', 'Эссе 1 абзац', 'Видеолекция 20 мин', '3 задачи', 'Новая тема 40 мин'],
      ['Медитация 5 мин', 'Медитация 10 мин', 'Медитация 15 мин', 'Медитация 20 мин', 'Скорочтение 15 мин']
    ];
    const soc = [
      ['Слушание 5 мин', 'Слушание 10 мин', 'Слушание 15 мин + анализ', 'Слушание 20 мин + разбор', 'Слушание 30 мин + резюме'],
      ['Речь 2 мин', 'Речь 3 мин (запись)', 'Речь 5 мин (камера)', 'Речь 7 мин + аргум.', 'Речь 10 мин + импров.'],
      ['1 комплимент', '2 комплимента', '3 комплимента', 'Новый контакт', 'Публичный пост'],
      ['Дневник 3 пр.', 'Дневник 5 пр.', 'Дневник + идея', 'Дневник + план', 'Дневник + рефлексия'],
      ['Осанка/улыбка 2 мин', 'Осанка 5 мин', 'Голос 5 мин', 'Эмпатия', 'Наставничество']
    ];
    let list = [];
    if (type === 'phys') {
      for (let i=0; i<5; i++) list.push(phys[i][idx] || phys[i][0]);
    } else if (type === 'ment') {
      for (let i=0; i<5; i++) list.push(ment[i][idx] || ment[i][0]);
    } else {
      for (let i=0; i<5; i++) list.push(soc[i][idx] || soc[i][0]);
    }
    return list;
  }

  function getAchievementsList() {
    return [
      { name: 'Первый шаг', bonus: '+5 EXP ко всем', condition: 'Выполнить любой квест 1 раз' },
      { name: 'Новичок', bonus: '+10 EXP к STR', condition: 'Выполнить 7 физических квестов' },
      { name: 'Стальные сухожилия', bonus: '+15 EXP к VIT', condition: 'STR ≥ 25' },
      { name: 'Быстрее ветра', bonus: '+15 EXP к AGI', condition: 'AGI ≥ 25' },
      { name: 'Железное сердце', bonus: '+20 EXP к VIT', condition: 'VIT ≥ 30' },
      { name: 'Тридцатник', bonus: '+1 очко стат', condition: 'STR, AGI, VIT ≥ 30' },
      { name: '50 отжиманий за раз', bonus: '+20 EXP к STR', condition: 'Выполнить 50 отжиманий' },
      { name: 'Бегун', bonus: '+20 EXP к VIT', condition: 'Пробежать 5 км без остановки' },
      { name: 'Машина', bonus: '+30 EXP ко всем', condition: 'Выполнять квесты 30 дней подряд' },
      { name: 'Элитный охотник', bonus: '+3 очка стат', condition: 'STR, AGI, VIT ≥ 50' },
      { name: 'Книжный червь', bonus: '+15 EXP к INT', condition: 'Прочитать 5 книг (нон-фикшн)' },
      { name: 'Логик', bonus: '+15 EXP к INT', condition: 'Решить 100 логических задач' },
      { name: 'Полиглот', bonus: '+20 EXP к INT', condition: 'Выучить 200 новых слов' },
      { name: 'Медитация', bonus: '+10 EXP к PER', condition: '50 сессий медитации' },
      { name: 'Интеллектуал', bonus: '+20 EXP к INT', condition: 'INT ≥ 30' },
      { name: 'Мыслитель', bonus: '+30 EXP к INT + 1 очко', condition: 'INT ≥ 50' },
      { name: 'Критик', bonus: '+20 EXP к INT', condition: 'Написать 10 эссе/конспектов' },
      { name: 'Скорость мысли', bonus: '+15 EXP к PER', condition: '30 задач на время' },
      { name: 'Контакт', bonus: '+10 EXP к CHA', condition: 'Сделать 10 комплиментов' },
      { name: 'Оратор', bonus: '+15 EXP к CHA', condition: 'Выступить с речью 10 раз' },
      { name: 'Эмпат', bonus: '+15 EXP к CHA', condition: 'Вести дневник эмоций 30 дней' },
      { name: 'Харизматик', bonus: '+20 EXP к CHA', condition: 'CHA ≥ 30' },
      { name: 'Лидер', bonus: '+30 EXP к CHA + 1 очко', condition: 'CHA ≥ 50' },
      { name: 'Слушатель', bonus: '+15 EXP к PER', condition: '30 сессий активного слушания' },
      { name: 'Нетворкер', bonus: '+20 EXP к CHA', condition: 'Завести 5 новых знакомств' },
      { name: 'Серебряный охотник', bonus: '+2 очка стат', condition: 'Все статы ≥ 30' },
      { name: 'Золотой охотник', bonus: '+3 очка стат', condition: 'Все статы ≥ 40' },
      { name: 'Платиновый охотник', bonus: '+5 очков стат', condition: 'Все статы ≥ 50' },
      { name: 'Легенда', bonus: '+50 EXP ко всем', condition: 'Выполнить 365 квестов (год)' },
      { name: 'Пробуждение', bonus: '+1 очко + титул', condition: 'Любая стата ≥ 70' }
    ];
  }

  function renderAchievements(data) {
    const list = getAchievementsList();
    const unlocked = data.unlockedAchievements || [];
    const container = document.getElementById('achievementList');
    container.innerHTML = '';
    list.forEach((ach, idx) => {
      const isUnlocked = unlocked.includes(idx);
      const div = document.createElement('div');
      div.className = 'achievement' + (isUnlocked ? '' : ' locked');
      div.innerHTML = `
        <span class="ach-name">${isUnlocked ? '✅' : '🔒'} ${ach.name}</span>
        <span class="ach-bonus">${ach.bonus}</span>
        <div class="ach-tooltip">
          <strong>${ach.name}</strong>
          <div style="margin-top:4px;color:#6a8aaa;font-size:12px;">📋 ${ach.condition}</div>
          <div style="margin-top:2px;color:#7a9ec8;font-size:11px;">🎁 ${ach.bonus}</div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  НОВЫЙ ДЕНЬ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function newDay() {
    soundNewDay();
    let data = loadData();
    const allPhys = data.quests.phys.every(v=>v);
    const allMent = data.quests.ment.every(v=>v);
    const allSoc = data.quests.soc.every(v=>v);
    const tripleBonus = allPhys && allMent && allSoc;
    const anyComplete = allPhys || allMent || allSoc;
    if (anyComplete) data.streak += 1;
    else data.streak = 0;

    const rank = getRank(avgAllMain(data));
    const bonusMap = { E:15, D:20, C:25, B:30, A:35 };
    const baseBonus = bonusMap[rank] || 15;

    if (allPhys) {
      data.stats.STR.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
      data.stats.AGI.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
      data.stats.VIT.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (allMent) {
      data.stats.INT.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (allSoc) {
      data.stats.CHA.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (tripleBonus) {
      data.stats.STR.exp += 30; data.stats.AGI.exp += 30; data.stats.VIT.exp += 30;
      data.stats.INT.exp += 30; data.stats.CHA.exp += 30;
      data.freePoints += 1;
    }

    const statKeys = ['STR','AGI','VIT','INT','CHA'];
    let leveled = false;
    statKeys.forEach(key => {
      let st = data.stats[key];
      while (st.exp >= expToNext(st.level)) {
        st.exp -= expToNext(st.level);
        st.level += 1;
        leveled = true;
      }
    });
    if (leveled) {
      soundLevelUp();
      data.freePoints += 3;
    }

    // PER пассивно
    const intLv = data.stats.INT.level;
    const chaLv = data.stats.CHA.level;
    const bonusPer = Math.floor(data.day / 10) * 0.5;
    const newPer = Math.floor(10 + Math.floor(intLv / 10) + Math.floor(chaLv / 15) + bonusPer);
    if (newPer > data.stats.PER.level) data.stats.PER.level = newPer;

    data.quests.phys = [false,false,false,false,false];
    data.quests.ment = [false,false,false,false,false];
    data.quests.soc = [false,false,false,false,false];
    data.dayStarted = false;
    data.day += 1;

    const newUnlocks = checkAchievements(data);
    if (newUnlocks.length > 0) {
      soundAchievement();
      data.justUnlocked = newUnlocks;
    } else {
      data.justUnlocked = [];
    }

    saveData(data);
    renderAll(data);
  }

  function checkAchievements(data) {
    const unlocked = data.unlockedAchievements || [];
    const s = data.stats;
    const newUnlocks = [];
    const allMain = s.STR.level >= 30 && s.AGI.level >= 30 && s.VIT.level >= 30 && s.INT.level >= 30 && s.CHA.level >= 30;
    const checks = [
      { idx: 0, cond: data.day > 1 },
      { idx: 1, cond: data.day >= 7 },
      { idx: 2, cond: s.STR.level >= 25 },
      { idx: 3, cond: s.AGI.level >= 25 },
      { idx: 4, cond: s.VIT.level >= 30 },
      { idx: 5, cond: s.STR.level >= 30 && s.AGI.level >= 30 && s.VIT.level >= 30 },
      { idx: 6, cond: false },
      { idx: 7, cond: false },
      { idx: 8, cond: data.day >= 30 },
      { idx: 9, cond: s.STR.level >= 50 && s.AGI.level >= 50 && s.VIT.level >= 50 },
      { idx: 10, cond: false },
      { idx: 11, cond: false },
      { idx: 12, cond: false },
      { idx: 13, cond: false },
      { idx: 14, cond: s.INT.level >= 30 },
      { idx: 15, cond: s.INT.level >= 50 },
      { idx: 16, cond: false },
      { idx: 17, cond: false },
      { idx: 18, cond: false },
      { idx: 19, cond: false },
      { idx: 20, cond: false },
      { idx: 21, cond: s.CHA.level >= 30 },
      { idx: 22, cond: s.CHA.level >= 50 },
      { idx: 23, cond: false },
      { idx: 24, cond: false },
      { idx: 25, cond: allMain },
      { idx: 26, cond: s.STR.level >= 40 && s.AGI.level >= 40 && s.VIT.level >= 40 && s.INT.level >= 40 && s.CHA.level >= 40 },
      { idx: 27, cond: s.STR.level >= 50 && s.AGI.level >= 50 && s.VIT.level >= 50 && s.INT.level >= 50 && s.CHA.level >= 50 },
      { idx: 28, cond: data.day >= 365 },
      { idx: 29, cond: s.STR.level >= 70 || s.AGI.level >= 70 || s.VIT.level >= 70 || s.INT.level >= 70 || s.CHA.level >= 70 }
    ];
    checks.forEach(c => {
      if (c.cond && !unlocked.includes(c.idx)) {
        unlocked.push(c.idx);
        newUnlocks.push(c.idx);
      }
    });
    data.unlockedAchievements = [...new Set(unlocked)];
    return newUnlocks;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ПРИВЕТСТВИЕ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function showWelcome() {
    const data = loadData();
    document.getElementById('welcomeDays').textContent = data.day;
    document.getElementById('welcomeOverlay').classList.remove('hidden');
  }

  function hideWelcome() {
    document.getElementById('welcomeOverlay').classList.add('hidden');
    // сохраняем состояние, чтобы больше не показывать в этой сессии
    sessionStorage.setItem('welcomeShown', 'true');
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ПОЛНЫЙ СБРОС
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function resetFull() {
    if (confirm('Сбросить весь прогресс?')) {
      soundClick();
      localStorage.removeItem('hunterSystemData');
      sessionStorage.removeItem('welcomeShown');
      location.reload();
    }
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  СТАРТ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let appData = loadData();
  renderAll(appData);

  // Показываем приветствие, если ещё не показывали в этой сессии
  if (!sessionStorage.getItem('welcomeShown')) {
    showWelcome();
  }

  // Кнопка "Принять" в приветствии
  document.getElementById('welcomeAccept').addEventListener('click', hideWelcome);

  // Основные кнопки
  document.getElementById('btnNewDay').addEventListener('click', newDay);
  document.querySelector('.header .title').addEventListener('dblclick', resetFull);

  window.addEventListener('beforeunload', () => {
    const data = loadData();
    saveData(data);
  });
</script>
