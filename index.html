<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Система Охотника — Профиль</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0c12;
      color: #c8d0e0;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 820px;
      width: 100%;
      background: #0e121b;
      border: 2px solid #1f2a3a;
      border-radius: 8px;
      padding: 20px 16px 28px;
      box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.15);
      animation: pulse-border 4s infinite ease-in-out;
    }
    @keyframes pulse-border {
      0% { border-color: #1a2a3a; box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.10); }
      50% { border-color: #3a7aaa; box-shadow: inset 0 0 12px 4px rgba(80, 180, 255, 0.20); }
      100% { border-color: #1a2a3a; box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.10); }
    }
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid #1f2a3a;
      padding-bottom: 10px;
      margin-bottom: 16px;
    }
    .header .title {
      font-size: 22px;
      font-weight: 700;
      color: #8ab8ff;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(74, 158, 255, 0.2);
    }
    .header .info {
      font-size: 14px;
      color: #6a8aaa;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header .info strong {
      color: #b3d9ff;
    }

    /* ── БЛОК ПРОФИЛЯ ── */
    .profile-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 20px;
      padding: 12px 14px;
      background: #0e131e;
      border: 1px solid #1a2332;
      border-radius: 4px;
      box-shadow: inset 0 0 4px 1px rgba(80, 180, 255, 0.08);
    }
    .profile-info {
      flex: 2;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .profile-info .field {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
    }
    .profile-info .field label {
      color: #6a8aaa;
      min-width: 60px;
    }
    .profile-info .field input {
      background: #1a2332;
      border: 1px solid #2a3a4a;
      color: #b3d9ff;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 15px;
      flex: 1;
      min-width: 80px;
      outline: none;
      transition: border 0.2s;
    }
    .profile-info .field input:focus {
      border-color: #4a9eff;
    }
    .profile-info .field .title-value {
      color: #d4af37;
      font-weight: 700;
      font-size: 16px;
    }

    .profile-photo {
      flex: 1;
      min-width: 120px;
      max-width: 160px;
      aspect-ratio: 3 / 4;
      background: #1a2332;
      border: 1px solid #2a3a4a;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border 0.2s;
    }
    .profile-photo:hover {
      border-color: #4a9eff;
    }
    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .profile-photo .placeholder {
      color: #4a5a6a;
      font-size: 13px;
      text-align: center;
      padding: 8px;
      pointer-events: none;
    }
    .profile-photo input[type="file"] {
      display: none;
    }

    /* ── Вкладки (все в одну строку) ── */
    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 16px;
      border-bottom: 1px solid #1a2332;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: #6a8aaa;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      border-bottom: 2px solid transparent;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab-btn:hover {
      color: #b3d9ff;
    }
    .tab-btn.active {
      color: #8ab8ff;
      border-bottom-color: #4a9eff;
    }
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .tab-content.active {
      display: block;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── Карточка характеристик ── */
    .stat-card {
      background: #0e131e;
      border: 1px solid #1a2332;
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 4px 1px rgba(80, 180, 255, 0.08);
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .stat-card:hover {
      border-color: #2a4a6a;
      box-shadow: inset 0 0 6px 2px rgba(80, 180, 255, 0.12);
    }

    .stat-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .stat-table th {
      text-align: left;
      color: #6a8aaa;
      font-weight: 400;
      padding: 4px 0;
      border-bottom: 1px solid #1a2332;
    }
    .stat-table td {
      padding: 6px 0;
      vertical-align: middle;
      border-bottom: none;
    }
    .stat-table .stat-name {
      color: #d4af37;
      font-size: 1.25em;
      font-weight: 600;
      min-width: 100px;
    }
    .stat-table .stat-value {
      text-align: right;
      font-weight: 700;
      color: #ffffff;
      min-width: 40px;
    }
    .stat-table .stat-bar-row td {
      padding-top: 0;
      padding-bottom: 8px;
      border-bottom: 1px solid #141c2a;
    }
    .stat-table tr:last-child .stat-bar-row td {
      border-bottom: none;
    }
    .stat-bar-wrap {
      background: #1a2332;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 2px;
    }
    .stat-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1f6bb0, #4a9eff);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .stat-exp {
      font-size: 11px;
      color: #4a6a8a;
      display: flex;
      justify-content: space-between;
    }

    .radar-wrapper {
      display: flex;
      justify-content: center;
      margin: 16px 0 12px;
    }
    #radarCanvas {
      background: transparent;
      max-width: 280px;
      width: 100%;
      height: auto;
      aspect-ratio: 1/1;
    }

    /* ── Квесты ── */
    .card {
      background: #0e131e;
      border: 1px solid #1a2332;
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 4px 1px rgba(80, 180, 255, 0.08);
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .card:hover {
      border-color: #2a4a6a;
      box-shadow: inset 0 0 6px 2px rgba(80, 180, 255, 0.12);
    }
    .card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #7a9ec8;
      margin-bottom: 6px;
    }
    .quest-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      padding: 3px 0;
      border-bottom: 1px solid #141c2a;
    }
    .quest-item:last-child {
      border-bottom: none;
    }
    .quest-item input[type="checkbox"] {
      accent-color: #4a9eff;
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .quest-item.done {
      text-decoration: line-through;
      opacity: 0.4;
    }

    .badge {
      background: #1a2a3e;
      color: #7a9ec8;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 11px;
      display: inline-block;
    }
    .badge.active {
      background: #1a3a5a;
      color: #7ac0ff;
      border: 1px solid #4a9eff;
    }

    .badge-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0 8px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .btn {
      background: #1a2a3e;
      border: 1px solid #2a4a6a;
      color: #b3d9ff;
      padding: 8px 0;
      flex: 1;
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }
    .btn:hover {
      background: #1f3a5a;
      border-color: #4a9eff;
    }
    .btn-reset {
      background: #2a1a1a;
      border-color: #4a2a2a;
      color: #aa8a8a;
      flex: 0.6;
    }
    .btn-reset:hover {
      background: #3a1a1a;
      border-color: #6a3a3a;
      color: #ccaaaa;
    }

    /* ── Титулы ── */
    .title-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin: 12px 0;
    }
    .title-card {
      background: #0e131e;
      border: 1px solid #1a2332;
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border 0.2s, opacity 0.2s;
    }
    .title-card.locked {
      opacity: 0.35;
      border-color: #2a2a3a;
    }
    .title-card .title-name {
      color: #d4af37;
      font-weight: 600;
      font-size: 15px;
    }
    .title-card .title-status {
      font-size: 12px;
      color: #6a8aaa;
    }
    .title-card .title-select-btn {
      background: #1a2a3e;
      border: 1px solid #2a4a6a;
      color: #b3d9ff;
      padding: 2px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .title-card .title-select-btn:hover:not(:disabled) {
      background: #1f3a5a;
      border-color: #4a9eff;
    }
    .title-card .title-select-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .title-card.selected {
      border-color: #4a9eff;
      box-shadow: 0 0 8px rgba(74, 158, 255, 0.3);
    }

    /* ── Достижения ── */
    .achievement {
      background: #0e131e;
      border-radius: 4px;
      padding: 6px 12px;
      margin: 3px 0;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      border-left: 2px solid #1f3a5a;
      position: relative;
      cursor: default;
      box-shadow: inset 0 0 2px rgba(80,180,255,0.05);
    }
    .achievement.locked {
      opacity: 0.3;
      border-left-color: #2a2a3a;
    }
    .achievement.locked:hover {
      opacity: 0.7;
    }
    .achievement .ach-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: #0e131e;
      border: 1px solid #2a4a6a;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 12px;
      color: #b3d9ff;
      width: 240px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.8);
      z-index: 100;
      pointer-events: none;
    }
    .achievement.locked:hover .ach-tooltip {
      display: block;
    }
    .achievement .ach-name {
      font-weight: 400;
    }
    .achievement .ach-bonus {
      color: #7a9ec8;
      font-size: 11px;
    }

    .footer-info {
      font-size: 12px;
      color: #4a5a6a;
      margin-top: 16px;
      border-top: 1px solid #141c2a;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    /* ── Оверлей сообщений ── */
    .welcome-overlay {
      display: flex;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }
    .welcome-overlay.hidden {
      display: none;
    }
    .welcome-box {
      background: #0e121b;
      border: 2px solid #2a4a6a;
      border-radius: 8px;
      padding: 28px 32px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 40px rgba(80, 180, 255, 0.2), inset 0 0 12px 2px rgba(80, 180, 255, 0.10);
      animation: pulse-border 3s infinite ease-in-out;
    }
    .welcome-box h2 {
      color: #8ab8ff;
      font-weight: 400;
      letter-spacing: 1px;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .welcome-box .message {
      color: #b3d9ff;
      font-size: 18px;
      margin: 16px 0;
      line-height: 1.6;
      font-style: italic;
    }
    .welcome-box .highlight {
      color: #d4af37;
      font-weight: 700;
    }
    .welcome-box .btn-accept {
      background: #1a2a3e;
      border: 1px solid #4a9eff;
      color: #b3d9ff;
      padding: 10px 40px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 12px;
    }
    .welcome-box .btn-accept:hover {
      background: #1f3a5a;
      border-color: #7ac0ff;
      box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
    }

    @media (max-width: 600px) {
      .stat-table .stat-name {
        font-size: 1.1em;
        min-width: 70px;
      }
      .header .title {
        font-size: 18px;
      }
      .tab-btn {
        font-size: 12px;
        padding: 4px 8px;
      }
      .profile-row {
        flex-direction: column;
        align-items: stretch;
      }
      .profile-photo {
        max-width: 100%;
        aspect-ratio: 3 / 2;
      }
      .welcome-box {
        padding: 20px;
      }
      .welcome-box .message {
        font-size: 16px;
      }
      .btn-group {
        flex-direction: row;
        gap: 8px;
      }
      .btn-reset {
        flex: 1;
      }
      .title-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<!-- Оверлей сообщений -->
<div class="welcome-overlay hidden" id="welcomeOverlay">
  <div class="welcome-box">
    <h2 id="welcomeTitle"></h2>
    <div class="message" id="welcomeMessage"></div>
    <p>Дней в системе: <span class="highlight" id="welcomeDays">1</span></p>
    <button class="btn-accept" id="welcomeAccept">ПРИНЯТЬ</button>
  </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div class="container" id="app">

  <div class="header">
    <span class="title">📊 СИСТЕМА ОХОТНИКА</span>
    <div class="info">
      <span>Уровень <strong id="levelDisplay">1</strong></span>
      <span>Опыт <strong id="expDisplay">0</strong></span>
      <span>День <strong id="dayDisplay">1</strong></span>
    </div>
  </div>

  <!-- Блок профиля -->
  <div class="profile-row">
    <div class="profile-info">
      <div class="field">
        <label>Имя</label>
        <input type="text" id="userNameInput" placeholder="Ваше имя" value="">
      </div>
      <div class="field">
        <label>Возраст</label>
        <input type="number" id="userAgeInput" placeholder="Ваш возраст" value="" min="1" max="120">
      </div>
      <div class="field">
        <label>Титул</label>
        <span class="title-value" id="titleDisplay">Охотник E-ранга</span>
      </div>
    </div>
    <div class="profile-photo" id="photoContainer">
      <img id="userPhotoImg" src="" alt="Фото" style="display:none;">
      <span class="placeholder" id="photoPlaceholder">📷 Загрузить фото</span>
      <input type="file" id="photoInput" accept="image/*">
    </div>
  </div>

  <!-- Вкладки (4 штуки) -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="stats">📈 Хар-ки</button>
    <button class="tab-btn" data-tab="quests">📋 Задания</button>
    <button class="tab-btn" data-tab="titles">🏅 Титулы</button>
    <button class="tab-btn" data-tab="achievements">🏆 Достижения</button>
  </div>

  <!-- Блок Характеристики -->
  <div class="tab-content active" id="tab-stats">
    <div class="stat-card">
      <table class="stat-table">
        <thead>
          <tr>
            <th style="width:60%;">Характеристика</th>
            <th style="width:40%; text-align:right;">Значение</th>
          </tr>
        </thead>
        <tbody id="statBody">
          <!-- генерируется скриптом -->
        </tbody>
      </table>
    </div>
    <div class="radar-wrapper">
      <canvas id="radarCanvas" width="400" height="400"></canvas>
    </div>
    <div class="btn-group">
      <button class="btn btn-reset" id="btnResetFull">🔄 Сброс</button>
    </div>
  </div>

  <!-- Блок Задания -->
  <div class="tab-content" id="tab-quests">
    <div class="card">
      <h3>💪 Физический</h3>
      <div id="physQuestList"></div>
    </div>
    <div class="card">
      <h3>🧠 Ментальный</h3>
      <div id="mentQuestList"></div>
    </div>
    <div class="card">
      <h3>🗣 Социальный</h3>
      <div id="socQuestList"></div>
    </div>
    <div class="badge-group">
      <span class="badge" id="bonusTri">🌟 Все сферы: нет</span>
      <span class="badge" id="bonusStreak">🔥 Стрик 7+: нет</span>
    </div>
  </div>

  <!-- Блок Титулы -->
  <div class="tab-content" id="tab-titles">
    <div class="title-grid" id="titleGrid">
      <!-- генерируется скриптом -->
    </div>
  </div>

  <!-- Блок Достижения -->
  <div class="tab-content" id="tab-achievements">
    <div id="achievementList"></div>
  </div>

  <div class="footer-info">
    <span>💾 Автосохранение</span>
    <span>⏱️ <span id="lastSave">—</span></span>
  </div>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ЗВУКИ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
  function playTone(freq, dur, type='sine', vol=0.12) {
    try {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = vol;
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }
  function soundClick() { playTone(440, 0.05, 'sine', 0.06); }
  function soundLevelUp() { playTone(523,0.1); setTimeout(()=>playTone(659,0.1),100); setTimeout(()=>playTone(784,0.15),200); }
  function soundAchievement() { playTone(880,0.1); setTimeout(()=>playTone(1109,0.1),120); setTimeout(()=>playTone(1319,0.2),240); }
  function soundNewDay() { playTone(330,0.08); setTimeout(()=>playTone(440,0.08),100); setTimeout(()=>playTone(554,0.12),200); }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ДАННЫЕ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const DEFAULT = {
    day: 1,
    streak: 0,
    freePoints: 0,
    lastDate: '',
    name: '',
    age: '',
    photo: '',
    selectedTitle: 'Охотник E-ранга',
    stats: {
      STR: { level: 10, exp: 0 },
      AGI: { level: 10, exp: 0 },
      VIT: { level: 10, exp: 0 },
      INT: { level: 10, exp: 0 },
      CHA: { level: 10, exp: 0 },
      PER: { level: 10, exp: 0 }
    },
    quests: {
      phys: [false,false,false,false,false],
      ment: [false,false,false,false,false],
      soc: [false,false,false,false,false]
    },
    unlockedAchievements: [],
    justUnlocked: []
  };

  function loadData() {
    try {
      const raw = localStorage.getItem('hunterSystemData');
      if (raw) {
        const parsed = JSON.parse(raw);
        for (let key in DEFAULT) {
          if (!(key in parsed)) parsed[key] = DEFAULT[key];
        }
        return parsed;
      }
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT));
  }

  function saveData(data) {
    localStorage.setItem('hunterSystemData', JSON.stringify(data));
    document.getElementById('lastSave').textContent = new Date().toLocaleTimeString();
  }

  function expToNext(level) {
    return Math.round(100 * (1 + (level - 1) * 0.08));
  }

  function avgAllMain(data) {
    const s = data.stats;
    return (s.STR.level + s.AGI.level + s.VIT.level + s.INT.level + s.CHA.level) / 5;
  }

  function getRank(avg) {
    if (avg < 16) return 'E';
    if (avg < 26) return 'D';
    if (avg < 41) return 'C';
    if (avg < 61) return 'B';
    return 'A';
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ЗАВЕРШЕНИЕ ДНЯ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function finishDay(data) {
    const allPhys = data.quests.phys.every(v=>v);
    const allMent = data.quests.ment.every(v=>v);
    const allSoc = data.quests.soc.every(v=>v);
    const tripleBonus = allPhys && allMent && allSoc;
    const anyComplete = allPhys || allMent || allSoc;

    if (anyComplete) data.streak += 1;
    else data.streak = 0;

    const rank = getRank(avgAllMain(data));
    const bonusMap = { E:15, D:20, C:25, B:30, A:35 };
    const baseBonus = bonusMap[rank] || 15;

    if (allPhys) {
      data.stats.STR.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
      data.stats.AGI.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
      data.stats.VIT.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (allMent) {
      data.stats.INT.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (allSoc) {
      data.stats.CHA.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (tripleBonus) {
      data.stats.STR.exp += 30;
      data.stats.AGI.exp += 30;
      data.stats.VIT.exp += 30;
      data.stats.INT.exp += 30;
      data.stats.CHA.exp += 30;
      data.freePoints += 1;
    }

    const statKeys = ['STR','AGI','VIT','INT','CHA'];
    let leveled = false;
    statKeys.forEach(key => {
      let st = data.stats[key];
      while (st.exp >= expToNext(st.level)) {
        st.exp -= expToNext(st.level);
        st.level += 1;
        leveled = true;
      }
    });
    if (leveled) {
      soundLevelUp();
      data.freePoints += 3;
    }

    const intLv = data.stats.INT.level;
    const chaLv = data.stats.CHA.level;
    const bonusPer = Math.floor(data.day / 10) * 0.5;
    const newPer = Math.floor(10 + Math.floor(intLv / 10) + Math.floor(chaLv / 15) + bonusPer);
    if (newPer > data.stats.PER.level) data.stats.PER.level = newPer;

    data.quests.phys = [false,false,false,false,false];
    data.quests.ment = [false,false,false,false,false];
    data.quests.soc = [false,false,false,false,false];
    data.day += 1;

    const newUnlocks = checkAchievements(data);
    if (newUnlocks.length > 0) {
      soundAchievement();
      data.justUnlocked = newUnlocks;
    } else {
      data.justUnlocked = [];
    }

    return data;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ПРОВЕРКА НОВОГО ДНЯ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function checkNewDay() {
    let data = loadData();
    const today = new Date().toDateString();
    const lastDate = data.lastDate || '';

    if (lastDate === '') {
      data.lastDate = today;
      saveData(data);
      showDailyMessage(1);
      return data;
    }

    if (today !== lastDate) {
      data = finishDay(data);
      data.lastDate = today;
      saveData(data);
      soundNewDay();
      showDailyMessage(data.day);
    }
    return data;
  }

  // ── Радар ──
  function renderRadar(data) {
    const canvas = document.getElementById('radarCanvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2, r = Math.min(w, h) * 0.38;

    ctx.clearRect(0, 0, w, h);

    const stats = data.stats;
    const keys = ['STR', 'VIT', 'AGI', 'INT', 'PER', 'CHA'];
    const values = keys.map(k => Math.min(100, stats[k].level));
    const labels = ['Сила', 'Жизнь', 'Ловк.', 'Интел.', 'Воспр.', 'Харизма'];

    const angles = keys.map((_, i) => (i / keys.length) * 2 * Math.PI - Math.PI/2);
    ctx.strokeStyle = '#2a3a4a';
    ctx.lineWidth = 1;

    for (let level = 1; level <= 4; level++) {
      const scale = level / 4;
      ctx.beginPath();
      angles.forEach((ang, i) => {
        const x = cx + r * scale * Math.cos(ang);
        const y = cy + r * scale * Math.sin(ang);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.strokeStyle = level === 4 ? '#4a5a6a' : '#1a2a3a';
      ctx.stroke();
    }

    angles.forEach(ang => {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + r * Math.cos(ang), cy + r * Math.sin(ang));
      ctx.strokeStyle = '#1a2a3a';
      ctx.stroke();
    });

    ctx.fillStyle = '#6a8aaa';
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    angles.forEach((ang, i) => {
      const x = cx + (r + 24) * Math.cos(ang);
      const y = cy + (r + 24) * Math.sin(ang);
      ctx.fillText(labels[i], x, y);
    });

    ctx.beginPath();
    const dataPoints = values.map((val, i) => {
      const scale = val / 100;
      const x = cx + r * scale * Math.cos(angles[i]);
      const y = cy + r * scale * Math.sin(angles[i]);
      return {x, y};
    });
    dataPoints.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.fillStyle = 'rgba(74, 158, 255, 0.25)';
    ctx.fill();
    ctx.strokeStyle = '#4a9eff';
    ctx.lineWidth = 2;
    ctx.stroke();

    dataPoints.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
      ctx.fillStyle = '#4a9eff';
      ctx.fill();
      ctx.strokeStyle = '#b3d9ff';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

    const checks = [
      { idx: 0, cond: data.day > 1 },

      { idx: 3, cond: s.AGI.level >= 25 },

      { idx: 5, cond: s.STR.level >= 30 && s.AGI.level >= 30 && s.VIT.level >= 30 },
      { idx: 6, cond: false },
      { idx: 7, cond: false },
      { idx: 8, cond: data.day >= 30 },
      { idx: 9, cond: s.STR.level >= 50 && s.AGI.level >= 50 && s.VIT.level >= 50 },
      { idx: 10, cond: false },
      { idx: 11, cond: false },
      { idx: 12, cond: false },
      { idx: 13, cond: false },
      { idx: 14, cond: s.INT.level >= 30 },
      { idx: 15, cond: s.INT.level >= 50 },
      { idx: 16, cond: false },
      { idx: 17, cond: false },
      { idx: 18, cond: false },
      { idx: 19, cond: false },
      { idx: 20, cond: false },
      { idx: 21, cond: s.CHA.level >= 30 },
      { idx: 22, cond: s.CHA.level >= 50 },
      { idx: 23, cond: false },
      { idx: 24, cond: false },
      { idx: 25, cond: allMain },
      { idx: 26, cond: s.STR.level >= 40 && s.AGI.level >= 40 && s.VIT.level >= 40 && s.INT.level >= 40 && s.CHA.level >= 40 },
      { idx: 27, cond: s.STR.level >= 50 && s.AGI.level >= 50 && s.VIT.level >= 50 && s.INT.level >= 50 && s.CHA.level >= 50 },
      { idx: 28, cond: data.day >= 365 },
      { idx: 29, cond: s.STR.level >= 70 || s.AGI.level >= 70 || s.VIT.level >= 70 || s.INT.level >= 70 || s.CHA.level >= 70 }
    ];
    checks.forEach(c => {
      if (c.cond && !unlocked.includes(c.idx)) {
        unlocked.push(c.idx);
        newUnlocks.push(c.idx);
      }
    });
    data.unlockedAchievements = [...new Set(unlocked)];
    return newUnlocks;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ЕЖЕДНЕВНЫЕ СООБЩЕНИЯ (без "Мудрость дня" после 1-го)
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const dailyMessages = {
    1: {
      title: '⚔️ ДОБРО ПОЖАЛОВАТЬ',
      text: 'Охотник, ты пробудился.<br>Твой путь начинается сегодня.'
    },
    2: {
      title: '',
      text: '«Если я сдамся из-за того, что испугался, то не смогу стать сильнее.»'
    },
    3: {
      title: '',
      text: '«Если боль не убьет меня, она лишь сделает меня сильнее.»'
    },
    4: {
      title: '',
      text: '«Когда ты смотришь в бездну, бездна смотрит на тебя.»'
    },
    5: {
      title: '',
      text: '«Приходит осень, приходит зима, а следом весна. Во всем есть начало и конец, и за концом всегда следует новое начало.»'
    },
    6: {
      title: '',
      text: '«Система хочет, чтобы я жил.»'
    },
    7: {
      title: '',
      text: '«Система использует меня, а я использую систему.»'
    }
  };

  function showDailyMessage(day) {
    if (day >= 1 && day <= 7) {
      const key = 'dailyMsg_' + day;
      if (!sessionStorage.getItem(key)) {
        const msg = dailyMessages[day];
        if (msg) {
          document.getElementById('welcomeTitle').textContent = msg.title;
          document.getElementById('welcomeMessage').innerHTML = msg.text;
          document.getElementById('welcomeDays').textContent = day;
          document.getElementById('welcomeOverlay').classList.remove('hidden');
          sessionStorage.setItem(key, 'shown');
        }
      }
    }
  }

  function hideWelcome() {
    document.getElementById('welcomeOverlay').classList.add('hidden');
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ВКЛАДКИ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function setupTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = {
      stats: document.getElementById('tab-stats'),
      quests: document.getElementById('tab-quests'),
      titles: document.getElementById('tab-titles'),
      achievements: document.getElementById('tab-achievements')
    };

    tabs.forEach(btn => {
      btn.addEventListener('click', function() {
        tabs.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const tabId = this.dataset.tab;
        Object.keys(contents).forEach(key => {
          contents[key].classList.toggle('active', key === tabId);
        });
        if (tabId === 'stats') {
          const data = loadData();
          renderRadar(data);
        }
        soundClick();
      });
    });
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ПОЛНЫЙ СБРОС
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function resetFull() {
    if (confirm('Сбросить весь прогресс (характеристики, дни, ачивки)?')) {
      soundClick();
      localStorage.removeItem('hunterSystemData');
      for (let i = 1; i <= 7; i++) {
        sessionStorage.removeItem('dailyMsg_' + i);
      }
      location.reload();
    }
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ФОТО – ЗАГРУЗКА
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function setupPhotoUpload() {
    const container = document.getElementById('photoContainer');
    const input = document.getElementById('photoInput');

    container.addEventListener('click', function(e) {
      if (e.target.tagName !== 'IMG') {
        input.click();
      }
    });

    input.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        let base64 = ev.target.result;
        compressImage(base64, function(compressed) {
          const data = loadData();
          data.photo = compressed;
          saveData(data);
          updatePhoto(compressed);
          soundClick();
        });
      };
      reader.readAsDataURL(file);
    });
  }

  function compressImage(base64, callback) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const maxSize = 400;
      if (w > maxSize || h > maxSize) {
        const ratio = Math.min(maxSize / w, maxSize / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      callback(compressed);
    };
    img.src = base64;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ИМЯ/ВОЗРАСТ – СОХРАНЕНИЕ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function setupProfileEditing() {
    const nameInput = document.getElementById('userNameInput');
    const ageInput = document.getElementById('userAgeInput');

    nameInput.addEventListener('change', function() {
      const data = loadData();
      data.name = this.value.trim();
      saveData(data);
      soundClick();
    });

    ageInput.addEventListener('change', function() {
      const data = loadData();
      data.age = this.value.trim();
      saveData(data);
      soundClick();
    });
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  СТАРТ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  let appData = checkNewDay();
  renderAll(appData);
  setupTabs();
  setupPhotoUpload();
  setupProfileEditing();

  document.getElementById('welcomeAccept').addEventListener('click', hideWelcome);
  document.getElementById('btnResetFull').addEventListener('click', resetFull);
  document.querySelector('.header .title').addEventListener('dblclick', resetFull);

  window.addEventListener('beforeunload', () => {
    const data = loadData();
    saveData(data);
  });
</script>
</body>
</html>
