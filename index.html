<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Система Охотника — Профиль</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0c12;
      color: #c8d0e0;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 820px;
      width: 100%;
      background: #0e121b;
      border: 2px solid #1f2a3a;
      border-radius: 8px;
      padding: 20px 16px 28px;
      box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.15);
      animation: pulse-border 4s infinite ease-in-out;
    }
    @keyframes pulse-border {
      0% { border-color: #1a2a3a; box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.10); }
      50% { border-color: #3a7aaa; box-shadow: inset 0 0 12px 4px rgba(80, 180, 255, 0.20); }
      100% { border-color: #1a2a3a; box-shadow: inset 0 0 8px 2px rgba(80, 180, 255, 0.10); }
    }
    .header {
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline;
      border-bottom: 1px solid #1f2a3a; padding-bottom: 10px; margin-bottom: 16px;
    }
    .header .title { font-size: 22px; font-weight: 700; color: #8ab8ff; letter-spacing: 1px; text-shadow: 0 0 8px rgba(74,158,255,0.2); }
    .header .info { font-size: 14px; color: #6a8aaa; display: flex; gap: 16px; flex-wrap: wrap; }
    .header .info strong { color: #b3d9ff; }

    /* Блок профиля */
    .profile-row {
      display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px;
      padding: 12px 14px; background: #0e131e; border: 1px solid #1a2332; border-radius: 4px;
      box-shadow: inset 0 0 4px 1px rgba(80,180,255,0.08);
    }
    .profile-info { flex: 2; min-width: 180px; display: flex; flex-direction: column; gap: 8px; }
    .profile-info .field { display: flex; align-items: center; gap: 8px; font-size: 15px; }
    .profile-info .field label { color: #6a8aaa; min-width: 60px; }
    .profile-info .field input { background: #1a2332; border: 1px solid #2a3a4a; color: #b3d9ff; padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: 15px; flex: 1; min-width: 80px; outline: none; transition: border 0.2s; }
    .profile-info .field input:focus { border-color: #4a9eff; }
    .profile-info .field .title-value { color: #d4af37; font-weight: 700; font-size: 16px; }
    .profile-photo {
      flex: 1; min-width: 120px; max-width: 160px; aspect-ratio: 3/4;
      background: #1a2332; border: 1px solid #2a3a4a; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; position: relative;
      transition: border 0.2s;
    }
    .profile-photo:hover { border-color: #4a9eff; }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .profile-photo .placeholder { color: #4a5a6a; font-size: 13px; text-align: center; padding: 8px; pointer-events: none; }
    .profile-photo input[type="file"] { display: none; }

    /* Вкладки */
    .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid #1a2332; flex-wrap: nowrap; overflow-x: auto; }
    .tab-btn {
      background: transparent; border: none; color: #6a8aaa; padding: 6px 10px; font-family: inherit; font-size: 13px;
      cursor: pointer; transition: 0.2s; border-bottom: 2px solid transparent; font-weight: 600; letter-spacing: 0.3px;
      white-space: nowrap; flex-shrink: 0;
    }
    .tab-btn:hover { color: #b3d9ff; }
    .tab-btn.active { color: #8ab8ff; border-bottom-color: #4a9eff; }
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }

    /* Карточка характеристик */
    .stat-card { background: #0e131e; border: 1px solid #1a2332; border-radius: 4px; padding: 12px 14px; margin-bottom: 12px; box-shadow: inset 0 0 4px 1px rgba(80,180,255,0.08); transition: box-shadow 0.3s, border-color 0.3s; }
    .stat-card:hover { border-color: #2a4a6a; box-shadow: inset 0 0 6px 2px rgba(80,180,255,0.12); }
    .stat-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .stat-table th { text-align: left; color: #6a8aaa; font-weight: 400; padding: 4px 0; border-bottom: 1px solid #1a2332; }
    .stat-table td { padding: 6px 0; vertical-align: middle; border-bottom: none; }
    .stat-table .stat-name { color: #d4af37; font-size: 1.25em; font-weight: 600; min-width: 100px; }
    .stat-table .stat-value { text-align: right; font-weight: 700; color: #ffffff; min-width: 40px; }
    .stat-table .stat-bar-row td { padding-top: 0; padding-bottom: 8px; border-bottom: 1px solid #141c2a; }
    .stat-table tr:last-child .stat-bar-row td { border-bottom: none; }
    .stat-bar-wrap { background: #1a2332; border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 2px; }
    .stat-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #1f6bb0, #4a9eff); border-radius: 4px; transition: width 0.5s ease; }
    .stat-exp { font-size: 11px; color: #4a6a8a; display: flex; justify-content: space-between; }

    .radar-wrapper { display: flex; justify-content: center; margin: 16px 0 12px; }
    #radarCanvas { background: transparent; max-width: 280px; width: 100%; height: auto; aspect-ratio: 1/1; }

    /* Карточки квестов */
    .card { background: #0e131e; border: 1px solid #1a2332; border-radius: 4px; padding: 12px 14px; margin-bottom: 12px; box-shadow: inset 0 0 4px 1px rgba(80,180,255,0.08); transition: box-shadow 0.3s, border-color 0.3s; }
    .card:hover { border-color: #2a4a6a; box-shadow: inset 0 0 6px 2px rgba(80,180,255,0.12); }
    .card h3 { font-size: 14px; font-weight: 600; color: #7a9ec8; margin-bottom: 6px; }
    .quest-item { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 3px 0; border-bottom: 1px solid #141c2a; }
    .quest-item:last-child { border-bottom: none; }
    .quest-item input[type="checkbox"] { accent-color: #4a9eff; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .quest-item input[type="checkbox"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .quest-item.done { text-decoration: line-through; opacity: 0.4; }

    /* Персональные задания */
    .personal-tasks {
      margin-top: 16px;
      border-top: 1px solid #1a2332;
      padding-top: 12px;
    }
    .personal-tasks .add-task {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .personal-tasks .add-task input {
      flex: 1; background: #1a2332; border: 1px solid #2a3a4a; color: #b3d9ff; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 14px; outline: none;
    }
    .personal-tasks .add-task input:focus { border-color: #4a9eff; }
    .personal-tasks .add-task button {
      background: #1a2a3e; border: 1px solid #2a4a6a; color: #b3d9ff; padding: 6px 16px; border-radius: 4px; font-family: inherit; font-size: 14px; cursor: pointer; transition: 0.2s;
    }
    .personal-tasks .add-task button:hover { background: #1f3a5a; border-color: #4a9eff; }
    .personal-tasks .task-item { display: flex; align-items: center; gap: 10px; padding: 3px 0; border-bottom: 1px solid #141c2a; font-size: 13px; }
    .personal-tasks .task-item:last-child { border-bottom: none; }
    .personal-tasks .task-item input[type="checkbox"] { accent-color: #4a9eff; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .personal-tasks .task-item.done { text-decoration: line-through; opacity: 0.4; }
    .personal-tasks .task-item .delete-btn {
      margin-left: auto; background: transparent; border: none; color: #6a3a3a; cursor: pointer; font-size: 16px; transition: 0.2s; padding: 0 4px;
    }
    .personal-tasks .task-item .delete-btn:hover { color: #aa4a4a; }

    .badge { background: #1a2a3e; color: #7a9ec8; padding: 2px 12px; border-radius: 30px; font-size: 11px; display: inline-block; }
    .badge.active { background: #1a3a5a; color: #7ac0ff; border: 1px solid #4a9eff; }
    .badge-group { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0 8px; }

    .btn-group { display: flex; gap: 12px; margin-top: 8px; }
    .btn { background: #1a2a3e; border: 1px solid #2a4a6a; color: #b3d9ff; padding: 8px 0; flex: 1; border-radius: 4px; font-family: inherit; font-size: 14px; cursor: pointer; transition: 0.2s; text-align: center; }
    .btn:hover { background: #1f3a5a; border-color: #4a9eff; }
    .btn-reset { background: #2a1a1a; border-color: #4a2a2a; color: #aa8a8a; flex: 0.6; }
    .btn-reset:hover { background: #3a1a1a; border-color: #6a3a3a; color: #ccaaaa; }

    /* Титулы */
    .title-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin: 12px 0; }
    .title-card { background: #0e131e; border: 1px solid #1a2332; border-radius: 4px; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; transition: border 0.2s, opacity 0.2s; }
    .title-card.locked { opacity: 0.35; border-color: #2a2a3a; }
    .title-card .title-name { color: #d4af37; font-weight: 600; font-size: 15px; }
    .title-card .title-status { font-size: 12px; color: #6a8aaa; }
    .title-card .title-select-btn { background: #1a2a3e; border: 1px solid #2a4a6a; color: #b3d9ff; padding: 2px 12px; border-radius: 4px; font-family: inherit; font-size: 12px; cursor: pointer; transition: 0.2s; }
    .title-card .title-select-btn:hover:not(:disabled) { background: #1f3a5a; border-color: #4a9eff; }
    .title-card .title-select-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .title-card.selected { border-color: #4a9eff; box-shadow: 0 0 8px rgba(74,158,255,0.3); }

    /* Достижения */
    .achievement { background: #0e131e; border-radius: 4px; padding: 6px 12px; margin: 3px 0; font-size: 13px; display: flex; justify-content: space-between; border-left: 2px solid #1f3a5a; position: relative; cursor: default; box-shadow: inset 0 0 2px rgba(80,180,255,0.05); }
    .achievement.locked { opacity: 0.3; border-left-color: #2a2a3a; }
    .achievement.locked:hover { opacity: 0.7; }
    .achievement .ach-tooltip { display: none; position: absolute; bottom: calc(100% + 8px); left: 0; background: #0e131e; border: 1px solid #2a4a6a; border-radius: 4px; padding: 8px 14px; font-size: 12px; color: #b3d9ff; width: 240px; box-shadow: 0 8px 30px rgba(0,0,0,0.8); z-index: 100; pointer-events: none; }
    .achievement.locked:hover .ach-tooltip { display: block; }
    .achievement .ach-name { font-weight: 400; }
    .achievement .ach-bonus { color: #7a9ec8; font-size: 11px; }

    .footer-info { font-size: 12px; color: #4a5a6a; margin-top: 16px; border-top: 1px solid #141c2a; padding-top: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; }

    /* Оверлей сообщений */
    .welcome-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(2px); }
    .welcome-overlay.hidden { display: none; }
    .welcome-box { background: #0e121b; border: 2px solid #2a4a6a; border-radius: 8px; padding: 28px 32px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 0 40px rgba(80,180,255,0.2), inset 0 0 12px 2px rgba(80,180,255,0.10); animation: pulse-border 3s infinite ease-in-out; }
    .welcome-box h2 { color: #8ab8ff; font-weight: 400; letter-spacing: 1px; font-size: 24px; margin-bottom: 8px; }
    .welcome-box .message { color: #b3d9ff; font-size: 18px; margin: 16px 0; line-height: 1.6; font-style: italic; }
    .welcome-box .highlight { color: #d4af37; font-weight: 700; }
    .welcome-box .btn-accept { background: #1a2a3e; border: 1px solid #4a9eff; color: #b3d9ff; padding: 10px 40px; border-radius: 4px; font-family: inherit; font-size: 16px; cursor: pointer; transition: 0.25s; margin-top: 12px; }
    .welcome-box .btn-accept:hover { background: #1f3a5a; border-color: #7ac0ff; box-shadow: 0 0 20px rgba(74,158,255,0.3); }

    /* Стили для тренировок */
    .training-form { display: flex; flex-direction: column; gap: 12px; }
    .training-form .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .training-form .row .form-group { flex: 1; min-width: 120px; }
    .training-form .form-group { display: flex; flex-direction: column; gap: 4px; }
    .training-form .form-group label { color: #6a8aaa; font-size: 14px; font-weight: 600; }
    .training-form .form-group input, .training-form .form-group select {
      background: #1a2332; border: 1px solid #2a3a4a; color: #b3d9ff; padding: 8px 10px; border-radius: 4px; font-family: inherit; font-size: 14px; outline: none; transition: border 0.2s;
    }
    .training-form .form-group input:focus, .training-form .form-group select:focus { border-color: #4a9eff; }
    .training-form .form-group select option { background: #0e121b; color: #b3d9ff; }
    .training-form .btn-generate {
      background: #1a3a5a; border: 1px solid #4a9eff; color: #b3d9ff; padding: 10px 0; border-radius: 4px; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 8px; width: 100%;
    }
    .training-form .btn-generate:hover { background: #1f4a6a; border-color: #7ac0ff; }
    .training-form .btn-reset-plan {
      background: #2a1a1a; border: 1px solid #4a2a2a; color: #aa8a8a; padding: 6px 0; border-radius: 4px; font-family: inherit; font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 4px; width: 100%;
    }
    .training-form .btn-reset-plan:hover { background: #3a1a1a; border-color: #6a3a3a; color: #ccaaaa; }

    .result-block { margin-top: 20px; background: #0e131e; border: 1px solid #1a2332; border-radius: 4px; padding: 16px; display: none; box-shadow: inset 0 0 4px 1px rgba(80,180,255,0.08); }
    .result-block.active { display: block; }
    .result-block .bmi-badge { display: inline-block; background: #1a2a3e; color: #7ac0ff; padding: 4px 14px; border-radius: 30px; font-weight: 600; font-size: 14px; }
    .result-block .plan-title { font-size: 22px; font-weight: 700; color: #d4af37; margin: 8px 0 4px; }
    .result-block .freq { font-size: 16px; color: #7ac0ff; font-weight: 500; }
    .result-block .description { background: #1a2332; padding: 12px; border-left: 4px solid #4a9eff; margin: 12px 0; line-height: 1.6; color: #b3d9ff; border-radius: 4px; }
    .result-block .exercises { list-style: none; padding: 0; }
    .result-block .exercises li { padding: 6px 10px; background: #1a2332; margin: 4px 0; border-radius: 4px; border: 1px solid #1a2a3a; display: flex; align-items: center; gap: 10px; color: #c8d0e0; }
    .result-block .exercises li::before { content: "✓"; color: #27ae60; font-weight: bold; }
    .result-block .warning { margin-top: 12px; background: #2a1a1a; border: 1px solid #4a2a2a; padding: 10px; border-radius: 4px; color: #ccaaaa; font-size: 13px; }

    @media (max-width: 600px) {
      .stat-table .stat-name { font-size: 1.1em; min-width: 70px; }
      .header .title { font-size: 18px; }
      .tab-btn { font-size: 11px; padding: 4px 6px; }
      .profile-row { flex-direction: column; align-items: stretch; }
      .profile-photo { max-width: 100%; aspect-ratio: 3/2; }
      .welcome-box { padding: 20px; }
      .welcome-box .message { font-size: 16px; }
      .btn-group { flex-direction: row; gap: 8px; }
      .btn-reset { flex: 1; }
      .title-grid { grid-template-columns: 1fr; }
      .training-form .row { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- Оверлей сообщений -->
<div class="welcome-overlay hidden" id="welcomeOverlay">
  <div class="welcome-box">
    <h2 id="welcomeTitle"></h2>
    <div class="message" id="welcomeMessage"></div>
    <p>Дней в системе: <span class="highlight" id="welcomeDays">1</span></p>
    <button class="btn-accept" id="welcomeAccept">ПРИНЯТЬ</button>
  </div>
</div>

<!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
<div class="container" id="app">

  <div class="header">
    <span class="title">📊 СИСТЕМА ОХОТНИКА</span>
    <div class="info">
      <span>Уровень <strong id="levelDisplay">1</strong></span>
      <span>Опыт <strong id="expDisplay">0</strong></span>
      <span>День <strong id="dayDisplay">1</strong></span>
    </div>
  </div>

  <!-- Блок профиля -->
  <div class="profile-row">
    <div class="profile-info">
      <div class="field"><label>Имя</label><input type="text" id="userNameInput" placeholder="Ваше имя" value=""></div>
      <div class="field"><label>Возраст</label><input type="number" id="userAgeInput" placeholder="Ваш возраст" value="" min="1" max="120"></div>
      <div class="field"><label>Титул</label><span class="title-value" id="titleDisplay">Охотник E-ранга</span></div>
    </div>
    <div class="profile-photo" id="photoContainer">
      <img id="userPhotoImg" src="" alt="Фото" style="display:none;">
      <span class="placeholder" id="photoPlaceholder">📷 Загрузить фото</span>
      <input type="file" id="photoInput" accept="image/*">
    </div>
  </div>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="stats">📈 Хар-ки</button>
    <button class="tab-btn" data-tab="quests">📋 Задания</button>
    <button class="tab-btn" data-tab="titles">🏅 Титулы</button>
    <button class="tab-btn" data-tab="trainings">🏋️ Тренировки</button>
    <button class="tab-btn" data-tab="achievements">🏆 Достижения</button>
  </div>

  <!-- Характеристики -->
  <div class="tab-content active" id="tab-stats">
    <div class="stat-card"><table class="stat-table"><thead><tr><th style="width:60%;">Характеристика</th><th style="width:40%; text-align:right;">Значение</th></tr></thead><tbody id="statBody"></tbody></table></div>
    <div class="radar-wrapper"><canvas id="radarCanvas" width="400" height="400"></canvas></div>
    <div class="btn-group"><button class="btn btn-reset" id="btnResetFull">🔄 Сброс</button></div>
  </div>

  <!-- Задания -->
  <div class="tab-content" id="tab-quests">
    <!-- Блок "Задания системы" -->
    <div style="margin-bottom: 16px;">
      <h2 style="color: #7a9ec8; font-size: 16px; font-weight: 400; border-bottom: 1px solid #1a2332; padding-bottom: 4px; margin-bottom: 10px;">📌 Задания системы</h2>
      <div class="card"><h3>💪 Физический</h3><div id="physQuestList"></div></div>
      <div class="card"><h3>🧠 Ментальный</h3><div id="mentQuestList"></div></div>
      <div class="card"><h3>🗣 Социальный</h3><div id="socQuestList"></div></div>
      <div class="badge-group">
        <span class="badge" id="bonusTri">🌟 Все сферы: нет</span>
        <span class="badge" id="bonusStreak">🔥 Стрик 7+: нет</span>
      </div>
    </div>

    <!-- Блок "Персональные задания" -->
    <div class="personal-tasks">
      <h2 style="color: #7a9ec8; font-size: 16px; font-weight: 400; border-bottom: 1px solid #1a2332; padding-bottom: 4px; margin-bottom: 10px;">📋 Персональные задания</h2>
      <div class="add-task">
        <input type="text" id="personalTaskInput" placeholder="Новое дело...">
        <button id="addPersonalTaskBtn">Добавить</button>
      </div>
      <div id="personalTaskList"></div>
    </div>
  </div>

  <!-- Титулы -->
  <div class="tab-content" id="tab-titles">
    <div class="title-grid" id="titleGrid"></div>
  </div>

  <!-- Тренировки -->
  <div class="tab-content" id="tab-trainings">
    <div class="training-form">
      <div class="row">
        <div class="form-group"><label>Вес (кг)</label><input type="number" id="weight" placeholder="70" step="0.1" min="20" max="250"></div>
        <div class="form-group"><label>Рост (см)</label><input type="number" id="height" placeholder="170" step="0.1" min="100" max="250"></div>
      </div>
      <div class="row">
        <div class="form-group"><label>Цель</label><select id="goal"><option value="похудение">Похудение / Сушка</option><option value="набор массы">Набор мышечной массы</option><option value="выносливость">Выносливость</option><option value="поддержание формы">Поддержание формы</option></select></div>
        <div class="form-group"><label>Уровень подготовки</label><select id="level"><option value="новичок">Новичок</option><option value="средний">Средний</option><option value="продвинутый">Продвинутый</option></select></div>
      </div>
      <button class="btn-generate" onclick="generatePlan()">Сгенерировать план</button>
      <button class="btn-reset-plan" id="btnResetPlan">🔄 Сбросить план</button>
    </div>
    <div id="resultBlock" class="result-block">
      <div><span class="bmi-badge" id="bmiDisplay"></span></div>
      <div class="plan-title" id="planType"></div>
      <div class="freq" id="frequency"></div>
      <div class="description" id="description"></div>
      <h3 style="color:#7a9ec8; font-size:14px; margin:10px 0 6px;">📋 Пример упражнений</h3>
      <ul class="exercises" id="exerciseList"></ul>
      <div class="warning" id="warning"></div>
    </div>
  </div>

  <!-- Достижения -->
  <div class="tab-content" id="tab-achievements">
    <div id="achievementList"></div>
  </div>

  <div class="footer-info">
    <span>💾 Автосохранение</span>
    <span>⏱️ <span id="lastSave">—</span></span>
  </div>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ЗВУКИ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
  function playTone(freq, dur, type='sine', vol=0.12) {
    try { initAudio(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.value = freq; gain.gain.value = vol; gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur); } catch(e) {}
  }
  function soundClick() { playTone(440, 0.05, 'sine', 0.06); }
  function soundLevelUp() { playTone(523,0.1); setTimeout(()=>playTone(659,0.1),100); setTimeout(()=>playTone(784,0.15),200); }
  function soundAchievement() { playTone(880,0.1); setTimeout(()=>playTone(1109,0.1),120); setTimeout(()=>playTone(1319,0.2),240); }
  function soundNewDay() { playTone(330,0.08); setTimeout(()=>playTone(440,0.08),100); setTimeout(()=>playTone(554,0.12),200); }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ДАННЫЕ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const DEFAULT = {
    day: 1,
    streak: 0,
    freePoints: 0,
    lastDate: '',
    name: '',
    age: '',
    photo: '',
    selectedTitle: 'Охотник E-ранга',
    weight: '',
    height: '',
    goal: 'похудение',
    fitnessLevel: 'новичок',
    customPhysItems: [], // список упражнений для физических заданий (пусто = нет заданий)
    personalTasks: [],
    stats: {
      STR: { level: 10, exp: 0 },
      AGI: { level: 10, exp: 0 },
      VIT: { level: 10, exp: 0 },
      INT: { level: 10, exp: 0 },
      CHA: { level: 10, exp: 0 },
      PER: { level: 10, exp: 0 }
    },
    quests: {
      phys: [], // чекбоксы для физических (длина совпадает с customPhysItems)
      ment: [false,false,false,false,false],
      soc: [false,false,false,false,false]
    },
    unlockedAchievements: [],
    justUnlocked: []
  };

  function loadData() {
    try {
      const raw = localStorage.getItem('hunterSystemData');
      if (raw) {
        const parsed = JSON.parse(raw);
        for (let key in DEFAULT) {
          if (!(key in parsed)) parsed[key] = DEFAULT[key];
        }
        // Если длина чекбоксов не совпадает с длиной упражнений – синхронизируем
        if (parsed.quests.phys.length !== parsed.customPhysItems.length) {
          parsed.quests.phys = parsed.customPhysItems.map(() => false);
        }
        return parsed;
      }
    } catch(e) {}
    return JSON.parse(JSON.stringify(DEFAULT));
  }

  function saveData(data) {
    localStorage.setItem('hunterSystemData', JSON.stringify(data));
    document.getElementById('lastSave').textContent = new Date().toLocaleTimeString();
  }

  function expToNext(level) { return Math.round(100 * (1 + (level - 1) * 0.08)); }
  function avgAllMain(data) { const s = data.stats; return (s.STR.level + s.AGI.level + s.VIT.level + s.INT.level + s.CHA.level) / 5; }
  function getRank(avg) { if (avg < 16) return 'E'; if (avg < 26) return 'D'; if (avg < 41) return 'C'; if (avg < 61) return 'B'; return 'A'; }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ЗАВЕРШЕНИЕ ДНЯ И ПРОВЕРКА НОВОГО ДНЯ
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function finishDay(data) {
    // Физические задания – только из customPhysItems, их чекбоксы не сбрасываются автоматически
    // Ментальные и социальные – стандартные
    const allPhys = data.customPhysItems.length > 0 ? data.quests.phys.every(v=>v) : false;
    const allMent = data.quests.ment.every(v=>v);
    const allSoc = data.quests.soc.every(v=>v);
    const tripleBonus = allPhys && allMent && allSoc;
    const anyComplete = allPhys || allMent || allSoc;
    if (anyComplete) data.streak += 1; else data.streak = 0;

    const rank = getRank(avgAllMain(data));
    const bonusMap = { E:15, D:20, C:25, B:30, A:35 };
    const baseBonus = bonusMap[rank] || 15;

    // Начисляем EXP за выполненные физические упражнения (по 10 за каждое)
    if (allPhys && data.customPhysItems.length > 0) {
      const count = data.customPhysItems.length;
      data.stats.STR.exp += count * 10 + (data.streak >= 7 ? 10 : 0);
      data.stats.AGI.exp += count * 10 + (data.streak >= 7 ? 10 : 0);
      data.stats.VIT.exp += count * 10 + (data.streak >= 7 ? 10 : 0);
    }
    if (allMent) {
      data.stats.INT.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (allSoc) {
      data.stats.CHA.exp += baseBonus + (data.streak >= 7 ? 10 : 0);
    }
    if (tripleBonus) {
      data.stats.STR.exp += 30;
      data.stats.AGI.exp += 30;
      data.stats.VIT.exp += 30;
      data.stats.INT.exp += 30;
      data.stats.CHA.exp += 30;
      data.freePoints += 1;
    }

    // Повышаем уровни
    const statKeys = ['STR','AGI','VIT','INT','CHA'];
    let leveled = false;
    statKeys.forEach(key => {
      let st = data.stats[key];
      while (st.exp >= expToNext(st.level)) {
        st.exp -= expToNext(st.level);
        st.level += 1;
        leveled = true;
      }
    });
    if (leveled) { soundLevelUp(); data.freePoints += 3; }

    // PER пассивно
    const intLv = data.stats.INT.level;
    const chaLv = data.stats.CHA.level;
    const bonusPer = Math.floor(data.day / 10) * 0.5;
    const newPer = Math.floor(10 + Math.floor(intLv / 10) + Math.floor(chaLv / 15) + bonusPer);
    if (newPer > data.stats.PER.level) data.stats.PER.level = newPer;

    // Сброс ментальных и социальных чекбоксов, физические НЕ сбрасываются
    data.quests.ment = [false,false,false,false,false];
    data.quests.soc = [false,false,false,false,false];
    data.day += 1;

    const newUnlocks = checkAchievements(data);
    if (newUnlocks.length > 0) { soundAchievement(); data.justUnlocked = newUnlocks; } else { data.justUnlocked = []; }

    return data;
  }

  function checkNewDay() {
    let data = loadData();
    const today = new Date().toDateString();
    const lastDate = data.lastDate || '';
    if (lastDate === '') { data.lastDate = today; saveData(data); showDailyMessage(1); return data; }
    if (today !== lastDate) {
      data = finishDay(data);
      data.lastDate = today;
      saveData(data);
      soundNewDay();
      showDailyMessage(data.day);
    }
    return data;
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  //  ОТРИСОВКА
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function renderAll(data) {
    const s = data.stats;
    const avg = avgAllMain(data);
    const rank = getRank(avg);
    document.getElementById('levelDisplay').textContent = Math.round(avg);
    document.getElementById('expDisplay').textContent = Math.round(s.STR.exp + s.AGI.exp + s.VIT.exp + s.INT.exp + s.CHA.exp);
    document.getElementById('dayDisplay').textContent = data.day;

    // Профиль
    const nameInput = document.getElementById('userNameInput');
    const ageInput = document.getElementById('userAgeInput');
    if (nameInput.value !== data.name) nameInput.value = data.name || '';
    if (ageInput.value !== data.age) ageInput.value = data.age || '';
    document.getElementById('titleDisplay').textContent = data.selectedTitle || 'Охотник E-ранга';
    updatePhoto(data.photo);

    // Поля тренировок
    const weightInput = document.getElementById('weight');
    const heightInput = document.getElementById('height');
    const goalSelect = document.getElementById('goal');
    const levelSelect = document.getElementById('level');
    if (weightInput.value !== data.weight) weightInput.value = data.weight || '';
    if (heightInput.value !== data.height) heightInput.value = data.height || '';
    if (goalSelect.value !== data.goal) goalSelect.value = data.goal || 'похудение';
    if (levelSelect.value !== data.fitnessLevel) levelSelect.value = data.fitnessLevel || 'новичок';

    renderStatTable(data);
    renderRadar(data);
    renderPhysQuests(data);
    renderQuest('ment', data.quests.ment, getStandardQuestList('ment', rank));
    renderQuest('soc', data.quests.soc, getStandardQuestList('soc', rank));

    // Персональные задания
    renderPersonalTasks(data.personalTasks || []);

    const allPhys = data.customPhysItems.length > 0 ? data.quests.phys.every(v=>v) : false;
    const allMent = data.quests.ment.every(v=>v);
    const allSoc = data.quests.soc.every(v=>v);
    const allDone = allPhys && allMent && allSoc;
    const triEl = document.getElementById('bonusTri');
    triEl.textContent = allDone ? '🌟 Все сферы: АКТИВНО' : '🌟 Все сферы: нет';
    triEl.className = 'badge' + (allDone ? ' active' : '');
    const streakEl = document.getElementById('bonusStreak');
    const hasStreak = data.streak >= 7;
    streakEl.textContent = hasStreak ? '🔥 Стрик 7+: АКТИВНО' : '🔥 Стрик 7+: нет';
    streakEl.className = 'badge' + (hasStreak ? ' active' : '');

    renderTitles(data);
    renderAchievements(data);
    saveData(data);
  }

  function updatePhoto(base64) {
    const img = document.getElementById('userPhotoImg');
    const placeholder = document.getElementById('photoPlaceholder');
    if (base64 && base64.length > 0) {
      img.src = base64; img.style.display = 'block'; placeholder.style.display = 'none';
    } else {
      img.style.display = 'none'; placeholder.style.display = 'block';
    }
  }

  // ── Таблица характеристик ──
  function renderStatTable(data) {
    const stats = data.stats;
    const rows = [
      { key: 'STR', label: '💪 Физическая сила' },
      { key: 'VIT', label: '❤️ Жизненная сила' },
      { key: 'AGI', label: '🏃 Ловкость' },
      { key: 'INT', label: '🧠 Интеллект' },
      { key: 'PER', label: '👁 Восприятие' },
      { key: 'CHA', label: '🗣 Харизма' }
    ];
    const tbody = document.getElementById('statBody');
    tbody.innerHTML = '';
    rows.forEach(row => {
      const st = stats[row.key];
      const need = expToNext(st.level);
      const progress = Math.min(100, (st.exp / need) * 100);
      const tr1 = document.createElement('tr');
      tr1.innerHTML = `<td class="stat-name">${row.label}</td><td class="stat-value">${st.level}</td>`;
      tbody.appendChild(tr1);
      const tr2 = document.createElement('tr');
      tr2.className = 'stat-bar-row';
      tr2.innerHTML = `
        <td colspan="2">
          <div class="stat-bar-wrap"><div class="stat-bar" style="width: ${progress}%;"></div></div>
          <div class="stat-exp"><span>EXP: ${Math.round(st.exp)} / ${need}</span><span>${Math.round(progress)}%</span></div>
        </td>
      `;
      tbody.appendChild(tr2);
    });
  }

  // ── Радар ──
  function renderRadar(data) {
    const canvas = document.getElementById('radarCanvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2, r = Math.min(w, h) * 0.38;
    ctx.clearRect(0, 0, w, h);
    const stats = data.stats;
    const keys = ['STR', 'VIT', 'AGI', 'INT', 'PER', 'CHA'];
    const values = keys.map(k => Math.min(100, stats[k].level));
    const labels = ['Сила', 'Жизнь', 'Ловк.', 'Интел.', 'Воспр.', 'Харизма'];
    const angles = keys.map((_, i) => (i / keys.length) * 2 * Math.PI - Math.PI/2);
    ctx.strokeStyle = '#2a3a4a'; ctx.lineWidth = 1;
    for (let level = 1; level <= 4; level++) {
      const scale = level / 4;
      ctx.beginPath();
      angles.forEach((ang, i) => {
        const x = cx + r * scale * Math.cos(ang);
        const y = cy + r * scale * Math.sin(ang);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.strokeStyle = level === 4 ? '#4a5a6a' : '#1a2a3a';
      ctx.stroke();
    }
    angles.forEach(ang => {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + r * Math.cos(ang), cy + r * Math.sin(ang));
      ctx.strokeStyle = '#1a2a3a';
      ctx.stroke();
    });
    ctx.fillStyle = '#6a8aaa';
    ctx.font = '12px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    angles.forEach((ang, i) => {
      const x = cx + (r + 24) * Math.cos(ang);
      const y = cy + (r + 24) * Math.sin(ang);
      ctx.fillText(labels[i], x, y);
    });
    ctx.beginPath();
    const dataPoints = values.map((val, i) => {
      const scale = val / 100;
      const x = cx + r * scale * Math.cos(angles[i]);
      const y = cy + r * scale * Math.sin(angles[i]);
      return {x, y};
    });
    dataPoints.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.fillStyle = 'rgba(74, 158, 255, 0.25)';
    ctx.fill();
    ctx.strokeStyle = '#4a9eff';
    ctx.lineWidth = 2;
    ctx.stroke();
    dataPoints.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
      ctx.fillStyle = '#4a9eff';
      ctx.fill();
      ctx.strokeStyle = '#b3d9ff';
      ctx.lineWidth = 1;
      ctx.stroke();
    });
  }

  // ── Физические квесты (только из customPhysItems) ──
  function renderPhysQuests(data) {
    const container = document.getElementById('physQuestList');
    container.innerHTML = '';
    const items = data.customPhysItems || [];
    const checks = data.quests.phys || [];
    // Если длина чекбоксов не совпадает – исправляем
    while (checks.length < items.length) checks.push(false);
    while (checks.length > items.length) checks.pop();
    data.quests.phys = checks;

    if (items.length === 0) {
      const p = document.createElement('p');
      p.style.color = '#4a5a6a';
      p.style.fontSize = '14px';
      p.style.padding = '8px 0';
      p.textContent = 'Нет физических заданий. Сгенерируйте план тренировок.';
      container.appendChild(p);
      return;
    }

    items.forEach((text, idx) => {
      const checked = checks[idx] || false;
      const div = document.createElement('div');
      div.className = 'quest-item' + (checked ? ' done' : '');
      const inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.checked = checked;
      inp.dataset.idx = idx;
      if (checked) inp.disabled = true;
      const span = document.createElement('span');
      span.textContent = text;
      div.appendChild(inp);
      div.appendChild(span);
      container.appendChild(div);
    });

    container.querySelectorAll('input[type="checkbox"]').forEach(inp => {
      inp.addEventListener('change', function() {
        if (this.checked) {
          this.disabled = true;
          soundClick();
          const idx = parseInt(this.dataset.idx);
          const data = loadData();
          data.quests.phys[idx] = true;
          saveData(data);
          renderAll(data);
        } else {
          this.checked = true;
        }
      });
    });
  }

  // ── Стандартные ментальные и социальные квесты ──
  function renderQuest(type, checks, items) {
    const containerId = type === 'ment' ? 'mentQuestList' : 'socQuestList';
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    items.forEach((text, idx) => {
      const checked = checks[idx] || false;
      const div = document.createElement('div');
      div.className = 'quest-item' + (checked ? ' done' : '');
      const inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.checked = checked;
      inp.dataset.type = type;
      inp.dataset.idx = idx;
      if (checked) inp.disabled = true;
      const span = document.createElement('span');
      span.textContent = text;
      div.appendChild(inp);
      div.appendChild(span);
      container.appendChild(div);
    });
    container.querySelectorAll('input[type="checkbox"]').forEach(inp => {
      inp.addEventListener('change', function() {
        if (this.checked) {
          this.disabled = true;
          soundClick();
          const type = this.dataset.type;
          const idx = parseInt(this.dataset.idx);
          const data = loadData();
          data.quests[type][idx] = true;
          saveData(data);
          renderAll(data);
        } else {
          this.checked = true;
        }
      });
    });
  }

  function getStandardQuestList(type, rank) {
    const ranks = ['E','D','C','B','A'];
    const r = Math.min(ranks.indexOf(rank), 4);
    const idx = r >= 0 ? r : 0;
    if (type === 'ment') {
      const ment = [
        ['Чтение 20 мин', 'Чтение 30 мин + анализ', 'Чтение 40 мин + разбор', 'Чтение 60 мин + выводы', 'Чтение 90 мин + критика'],
        ['Логика 15 мин', 'Шахматы/задачи 20 мин', 'Дебаты (письм.) 15 мин', 'Статья 500 зн.', 'Эссе 1000 зн.'],
        ['5 слов', '10 слов + диалог', '15 слов', '20 слов', '30 слов'],
        ['Конспект 5-7 пр.', 'Эссе 1 абзац', 'Видеолекция 20 мин', '3 задачи', 'Новая тема 40 мин'],
        ['Медитация 5 мин', 'Медитация 10 мин', 'Медитация 15 мин', 'Медитация 20 мин', 'Скорочтение 15 мин']
      ];
      return ment.map(arr => arr[idx] || arr[0]);
    } else { // social
      const soc = [
        ['Слушание 5 мин', 'Слушание 10 мин', 'Слушание 15 мин + анализ', 'Слушание 20 мин + разбор', 'Слушание 30 мин + резюме'],
        ['Речь 2 мин', 'Речь 3 мин (запись)', 'Речь 5 мин (камера)', 'Речь 7 мин + аргум.', 'Речь 10 мин + импров.'],
        ['1 комплимент', '2 комплимента', '3 комплимента', 'Новый контакт', 'Публичный пост'],
        ['Дневник 3 пр.', 'Дневник 5 пр.', 'Дневник + идея', 'Дневник + план', 'Дневник + рефлексия'],
        ['Осанка/улыбка 2 мин', 'Осанка 5 мин', 'Голос 5 мин', 'Эмпатия', 'Наставничество']
      ];
      return soc.map(arr => arr[idx] || arr[0]);
    }
  }

  // ── Персональные задания ──
  function renderPersonalTasks(tasks) {
    const container = document.getElementById('personalTaskList');
    container.innerHTML = '';
    tasks.forEach((task, index) => {
      const div = document.createElement('div');
      div.className = 'task-item' + (task.done ? ' done' : '');
      const inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.checked = task.done;
      inp.dataset.index = index;
      const span = document.createElement('span');
      span.textContent = task.text;
      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '✕';
      delBtn.dataset.index = index;
      div.appendChild(inp);
      div.appendChild(span);
      div.appendChild(delBtn);
      container.appendChild(div);
    });

    container.querySelectorAll('input[type="checkbox"]').forEach(inp => {
      inp.addEventListener('change', function() {
        const idx = parseInt(this.dataset.index);
        const data = loadData();
        data.personalTasks[idx].done = this.checked;
        saveData(data);
        renderAll(data);
        soundClick();
      });
    });
    container.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const idx = parseInt(this.dataset.index);
        const data = loadData();
        data.personalTasks.splice(idx, 1);
        saveData(data);
        renderAll(data);
        soundClick();
      });
    });
  }

  function addPersonalTask() {
    const input = document.getElementById('personalTaskInput');
    const text = input.value.trim();
    if (!text) return;
    const data = loadData();
    data.personalTasks.push({ text, done: false });
    saveData(data);
    renderAll(data);
    input.value = '';
    soundClick();
  }

  // ── Титулы ──
  function renderTitles(data) {
    const container = document.getElementById('titleGrid');
    container.innerHTML = '';
    const avg = avgAllMain(data);
    const titles = [
      { name: 'Охотник E-ранга', need: 0 },
      { name: 'Охотник D-ранга', need: 15 },
      { name: 'Охотник C-ранга', need: 25 },
      { name: 'Охотник B-ранга', need: 40 },
      { name: 'Охотник A-ранга', need: 60 },
      { name: 'Охотник S-ранга', need: 80 }
    ];
    const selected = data.selectedTitle || 'Охотник E-ранга';
    titles.forEach(t => {
      const unlocked = avg >= t.need;
      const isSelected = (selected === t.name);
      const div = document.createElement('div');
      div.className = 'title-card' + (unlocked ? '' : ' locked') + (isSelected ? ' selected' : '');
      div.innerHTML = `
        <span class="title-name">${t.name}</span>
        <span class="title-status">${unlocked ? '✅ Открыт' : '🔒 Заблокирован'}</span>
        <button class="title-select-btn" ${unlocked ? '' : 'disabled'} data-title="${t.name}">
          ${isSelected ? '✓ Выбран' : 'Выбрать'}
        </button>
      `;
      container.appendChild(div);
    });
    container.querySelectorAll('.title-select-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.disabled) return;
        const title = this.dataset.title;
        const data = loadData();
        data.selectedTitle = title;
        saveData(data);
        renderAll(data);
        soundClick();
      });
    });
  }

  function calculateBMI(weight, heightCm) {
    const heightM = heightCm / 100;
    return weight / (heightM * heightM);
  }

  function generatePlan() {
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value);
    const goal = document.getElementById('goal').value;
    const level = document.getElementById('level').value;
    const ageInput = document.getElementById('userAgeInput');
    const age = parseInt(ageInput.value) || 25;
    const sex = 'м';

    if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0 || age < 12) {
      alert('Пожалуйста, заполните вес, рост и возраст корректными значениями.');
      return;
    }

    const data = loadData();
    data.weight = weight.toString();
    data.height = height.toString();
    data.goal = goal;
    data.fitnessLevel = level;
    // Генерация упражнений
    let exercises = [];
    // ... (логика как в предыдущих версиях)
    // Для примера – простой план
    if (goal === 'похудение') {
      exercises = ['Ходьба 30 мин', 'Приседания 3×15', 'Отжимания 3×10', 'Планка 3×30 сек'];
    } else if (goal === 'набор массы') {
      exercises = ['Жим лёжа 4×10', 'Приседания 4×12', 'Становая тяга 4×8'];
    } else {
      exercises = ['Бег 5 км', 'Круговая тренировка', 'Плавание 45 мин'];
    }

    // Заменяем физические задания
    data.customPhysItems = exercises;
    data.quests.phys = exercises.map(() => false);
    saveData(data);
    renderAll(data);

    // Показываем результат
    document.getElementById('resultBlock').classList.add('active');
    document.getElementById('planType').textContent = 'Ваш план';
    document.getElementById('frequency').textContent = `Упражнений: ${exercises.length}`;
    document.getElementById('description').textContent = 'Сгенерированный план добавлен в физические задания.';
    const list = document.getElementById('exerciseList');
    list.innerHTML = '';
    exercises.forEach(ex => {
      const li = document.createElement('li');
      li.textContent = ex;
      list.appendChild(li);
    });
    document.getElementById('warning').textContent = '⚠️ Перед началом занятий проконсультируйтесь с врачом.';
    soundClick();
  }

  // ── Сброс плана ──
  function resetPlan() {
    if (confirm('Сбросить план тренировок? Физические задания станут пустыми.')) {
      const data = loadData();
      data.customPhysItems = [];
      data.quests.phys = [];
      saveData(data);
      renderAll(data);
      document.getElementById('resultBlock').classList.remove('active');
      soundClick();
    }
  }
